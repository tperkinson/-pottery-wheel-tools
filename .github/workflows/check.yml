name: Check

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  make-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install OpenSCAD
        run: |
          sudo apt-get update
          sudo apt-get install -y openscad

      - name: Run quick geometry checks
        run: make check
