<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="860" viewBox="0 0 1400 860">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 10 3.5, 0 7" fill="#222"/>
    </marker>
    <style>
      .title { font: 700 32px sans-serif; fill: #111; }
      .panelTitle { font: 700 24px sans-serif; fill: #1a1a1a; }
      .label { font: 500 18px sans-serif; fill: #0a3b7a; }
      .small { font: 500 16px sans-serif; fill: #222; }
      .tiny { font: 500 14px sans-serif; fill: #333; }
    </style>
  </defs>

  <rect x="0" y="0" width="1400" height="860" fill="#fff"/>
  <text x="700" y="46" text-anchor="middle" class="title">Revised Geometry Sketch (v3)</text>

  <!-- Top View (kept from your approved direction) -->
  <g transform="translate(40,95)">
    <rect x="0" y="0" width="640" height="730" rx="18" fill="#f7fbff" stroke="#d5e7f7"/>
    <text x="320" y="42" text-anchor="middle" class="panelTitle">Top View (Open Basin) - As Agreed</text>

    <path d="M 138 500 A 285 285 0 0 1 138 230 L 258 292 A 152 152 0 0 0 258 438 Z"
          fill="#cae8ff" stroke="#0a3b7a" stroke-width="5"/>
    <path d="M 155 484 A 260 260 0 0 1 155 246 L 242 295 A 162 162 0 0 0 242 435 Z"
          fill="#fff" stroke="#2a74c6" stroke-width="4"/>

    <line x1="138" y1="500" x2="258" y2="438" stroke="#0a3b7a" stroke-width="7"/>
    <line x1="138" y1="230" x2="258" y2="292" stroke="#0a3b7a" stroke-width="7"/>

    <text x="265" y="186" class="label">Back wall = radial arc</text>
    <text x="230" y="535" class="label">Front (clamp) wall = radial arc</text>

    <text x="18" y="220" class="tiny">Side wall on sweep-end ray</text>
    <text x="18" y="530" class="tiny">Side wall on sweep-end ray</text>

    <text x="360" y="360" class="small">Open top cavity</text>

    <line x1="468" y1="255" x2="420" y2="305" stroke="#222" stroke-width="2.4" marker-end="url(#arrow)"/>
    <line x1="468" y1="255" x2="390" y2="305" stroke="#222" stroke-width="2.4" marker-end="url(#arrow)"/>
    <text x="474" y="240" class="tiny">Uniform wall thickness</text>
  </g>

  <!-- Section View (fixed) -->
  <g transform="translate(720,95)">
    <rect x="0" y="0" width="640" height="730" rx="18" fill="#fbfff7" stroke="#dff0d6"/>
    <text x="320" y="42" text-anchor="middle" class="panelTitle">Section View (Fixed Corner Orientation)</text>

    <!-- Solid body outer silhouette:
         - NO cut on lower-left outer corner
         - ONLY lower-right outer corner is cut/filleted -->
    <path d="M 120 650
             L 430 650
             Q 500 650 500 580
             L 500 180
             L 395 180
             L 395 480
             Q 395 535 340 535
             L 240 535
             Q 185 535 185 590
             L 185 650
             Z"
          fill="#daf5cf" stroke="#1f7a1f" stroke-width="5"/>

    <!-- Explicitly mark the old/incorrect cut location as removed -->
    <text x="130" y="710" class="tiny" fill="#a33">No exterior cut here</text>

    <line x1="560" y1="265" x2="432" y2="265" stroke="#222" stroke-width="2.4" marker-end="url(#arrow)"/>
    <line x1="560" y1="265" x2="360" y2="265" stroke="#222" stroke-width="2.4" marker-end="url(#arrow)"/>
    <text x="566" y="250" class="tiny">Uniform wall thickness</text>

    <!-- Inside corner (kept as intended) -->
    <line x1="565" y1="445" x2="365" y2="515" stroke="#222" stroke-width="2.4" marker-end="url(#arrow)"/>
    <text x="570" y="438" class="tiny">Inside corner fillet</text>
    <text x="570" y="458" class="tiny">(kept)</text>

    <!-- Lower-right outside corner cut (corrected direction) -->
    <line x1="565" y1="620" x2="470" y2="632" stroke="#222" stroke-width="2.4" marker-end="url(#arrow)"/>
    <text x="570" y="613" class="tiny">Outside corner cut/fillet</text>
    <text x="570" y="633" class="tiny">(ONLY at lower-right)</text>

    <text x="190" y="145" class="small">Cut direction now matches lower-right corner</text>
  </g>
</svg>
